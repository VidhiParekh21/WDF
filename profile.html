<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudentHub - Student Profile</title>
</head>

<body style="background-color: rgb(7, 60, 107); font-family: Arial, sans-serif;">

    <center>

        <br><br>

        <table cellpadding="20" style="background-color:white; border-radius:10px;">

            <tr>
                <td>

                    <!-- Student Logo -->
                    <center>
                        <img src="images/student.png"
                             alt="StudentHub Logo"
                             width="100"
                             height="100">

                        <h1 style="color: rgb(7, 60, 107);">STUDENTHUB</h1>
                        <h2>Student Profile</h2>
                    </center>

                    <hr width="80%">

                    <form>

                        <table cellpadding="10">

                            <tr>
                                <td><b>Student Name</b></td>
                                <td><input type="text" placeholder="Enter your full name"></td>
                            </tr>

                            <tr>
                                <td><b>Enrollment Number</b></td>
                                <td><input type="text" placeholder="Enter enrollment number"></td>
                            </tr>

                            <tr>
                                <td><b>Department</b></td>
                                <td><input type="text" placeholder="Enter department"></td>
                            </tr>

                            <tr>
                                <td><b>Semester</b></td>
                                <td>
                                    <select>
                                        <option selected disabled>Select Semester</option>
                                        <option>Semester 1</option>
                                        <option>Semester 2</option>
                                        <option>Semester 3</option>
                                        <option>Semester 4</option>
                                        <option>Semester 5</option>
                                        <option>Semester 6</option>
                                        <option>Semester 7</option>
                                        <option>Semester 8</option>
                                    </select>
                                </td>
                            </tr>

                            <tr>
                                <td><b>Date of Birth</b></td>
                                <td><input type="date"></td>
                            </tr>

                            <tr>
                                <td><b>Gender</b></td>
                                <td>
                                    <input type="radio" name="gender"> Male
                                    <input type="radio" name="gender"> Female
                                    <input type="radio" name="gender"> Other
                                </td>
                            </tr>

                            <tr>
                                <td><b>Email</b></td>
                                <td><input type="email" placeholder="Enter your email"></td>
                            </tr>

                            <tr>
                                <td><b>Phone Number</b></td>
                                <td><input type="tel" placeholder="Enter phone number"></td>
                            </tr>

                            <tr>
                                <td><b>Address</b></td>
                                <td>
                                    <textarea rows="4" cols="30" placeholder="Enter your address"></textarea>
                                </td>
                            </tr>

                            <tr>
                                <td><b>Father's Name</b></td>
                                <td><input type="text" placeholder="Enter father's name"></td>
                            </tr>

                            <tr>
                                <td><b>Father's Occupation</b></td>
                                <td><input type="text" placeholder="Enter occupation"></td>
                            </tr>

                            <tr>
                                <td><b>Mother's Name</b></td>
                                <td><input type="text" placeholder="Enter mother's name"></td>
                            </tr>

                            <tr>
                                <td><b>Mother's Occupation</b></td>
                                <td><input type="text" placeholder="Enter occupation"></td>
                            </tr>

                        </table>

                        <br>

                        <center>
                            <input type="submit" value="Save Details">
                            <input type="reset" value="Clear">
                        </center>

                    </form>

                    <br>

                    <center>
                        <a href="homepage.html">
                            <button type="button">← Back to Dashboard</button>
                        </a>
                    </center>

                    <hr width="80%">

                    <center>
                        <p>
                            StudentHub © 2026 <br>
                            Manage your academic information in one place.
                        </p>
                    </center>

                </td>
            </tr>

        </table>

    </center>

</body>
</html>

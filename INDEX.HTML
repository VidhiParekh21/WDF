<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StudentHub - Login</title>
</head>

<body style="background-color: rgb(7, 60, 107); font-family: Arial, sans-serif;">

    <center>

        <br><br>

        <table border="0" cellpadding="20" style="background-color:white; border-radius:10px;">

            <tr>
                <td align="center">

                    <!-- Student Logo -->
                    <img src="images/student.png"
                         alt="StudentHub Logo"
                         width="120"
                         height="120">

                    <h1 style="color:rgb(150, 43, 78);">STUDENTHUB</h1>

                    <hr width="70%">

                    <h2>Student Login</h2>

                    <form action="homepage.html">

                        <table cellpadding="8">

                            <tr>
                                <td>Username</td>
                                <td>
                                    <input type="text" placeholder="Enter Username" required>
                                </td>
                            </tr>

                            <tr>
                                <td>Password</td>
                                <td>
                                    <input type="password" placeholder="Enter Password" required>
                                </td>
                            </tr>

                            <tr>
                                <td colspan="2" align="center">
                                    <br>
                                    <input type="submit" value="Login">
                                    <input type="reset" value="Clear">
                                </td>
                            </tr>

                        </table>

                    </form>

                    <br>

                    <a href="#">Forgot Password?</a>

                    <hr width="70%">

                    <p>
                        Welcome to StudentHub Portal.<br>
                        Access Attendance, Timetable, Assignments,<br>
                        Study Notes, Academic Calendar, and more.
                    </p>

                </td>
            </tr>

        </table>

    </center>

</body>
</html>
